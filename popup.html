<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Explain This</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="container">
    <!-- 标题栏 + 设置按钮 - 修复内联事件 -->
    <div class="header-bar">
        <div>
            <h1 style="margin: 0; font-size: 22px;">Explain This</h1>
            <p style="margin: 5px 0 0 0; font-size: 12px; opacity: 0.7;">Explain the highlighted contents</p>
        </div>
        <button id="settingsBtn" class="settings-btn" title="Settings">
            ⚙️
        </button>
    </div>

    <!-- 输入区域 -->
    <div class="input-section">
        <textarea
                id="inputText"
                placeholder="粘贴或输入你不懂的内容...
例如：'内卷是什么意思？'
      'Python中的装饰器怎么理解？'
      '这个历史典故有什么背景？'"
                rows="4"
        ></textarea>

        <div class="action-row">
            <div class="action-group" role="group" aria-label="Ask AI with language">
                <button id="explainBtn" class="ask-btn" type="button">✨ Ask AI</button>
                <div class="lang-wrap">
                    <button id="languageToggle" class="lang-toggle" type="button" aria-haspopup="listbox" aria-expanded="false">
                        ZH
                    </button>
                    <div id="languageMenu" class="lang-menu" role="listbox" aria-label="选择解释语言">
                        <div class="lang-item" role="option" data-value="zh">ZH</div>
                        <div class="lang-item" role="option" data-value="en">EN</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 结果显示区域 -->
    <div id="resultSection" class="result-section hidden">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
            <h3 style="margin: 0;">Results</h3>
            <span style="font-size: 12px; opacity: 0.5;"> Ctrl+Enter - Quick Explain</span>
        </div>
        <div id="resultContent">
            <!-- Results will be shown here -->
        </div>
        <div id="loading" class="hidden">
            <div class="spinner"></div>
            <p>Thinking...</p>
        </div>
    </div>

    <!-- 历史记录 -->
    <div id="historySection" class="history-section hidden">
        <div class="history-header">
            <h3 style="margin: 0;">最近记录</h3>
            <button id="clearHistoryBtn" class="history-clear">清空</button>
        </div>
        <div id="historyList" class="history-list"></div>
    </div>
</div>

<script src="popup.js"></script>
</body>
</html>
