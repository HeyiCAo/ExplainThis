<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Explain This</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="container">
    <!-- 标题栏 + 设置按钮 - 修复内联事件 -->
    <div class="header-bar">
        <div>
            <h1 style="margin: 0; font-size: 22px;">Explain This</h1>
            <p style="margin: 5px 0 0 0; font-size: 12px; opacity: 0.7;">Explain the highlighted contents</p>
        </div>
        <button id="settingsBtn" class="settings-btn" title="Settings">
            ⚙️
        </button>
    </div>

    <!-- 输入区域 -->
    <div class="input-section">
        <textarea
                id="inputText"
                placeholder="粘贴或输入你不懂的内容...
例如：'内卷是什么意思？'
      'Python中的装饰器怎么理解？'
      '这个历史典故有什么背景？'"
                rows="4"
        ></textarea>

        <button id="explainBtn">✨ Ask AI</button>
    </div>

    <!-- 结果显示区域 -->
    <div id="resultSection" class="result-section hidden">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
            <h3 style="margin: 0;">Results</h3>
            <span style="font-size: 12px; opacity: 0.5;"> Ctrl+Enter - Quick Explain</span>
        </div>
        <div id="resultContent">
            <!-- Results will be shown here -->
        </div>
        <div id="loading" class="hidden">
            <div class="spinner"></div>
            <p>Thinking...</p>
        </div>
    </div>
</div>

<script src="popup.js"></script>
</body>
</html>
